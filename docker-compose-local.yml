version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sql_logic_engine_mysql_local
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sql_logic_engine
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_local:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:7.0
    container_name: sql_logic_engine_redis_local
    ports:
      - "6379:6379"
    restart: always

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: sql_logic_engine_nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: always