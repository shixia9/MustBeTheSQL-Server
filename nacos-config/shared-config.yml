# =============================================================
# Nacos 配置中心 — 共享配置模板
# =============================================================
# 在 Nacos 控制台中创建：Data ID = shared-config.yml, Group = DEFAULT_GROUP
# 此配置由 sql-logic-service 和 sql-logic-gateway 共享
# =============================================================

# Sa-Token 配置（Service 和 Gateway 必须完全一致，共享同一 Redis 会话）
sa-token:
  token-name: satoken
  timeout: 2592000           # 30天，单位：秒
  active-timeout: -1        # 永不冻结
  is-concurrent: true       # 允许同一账号多地登录
  is-share: true            # 多人登录共用 token
  token-style: uuid
  is-log: true

# 共享的公共配置
engine:
  crypto:
    aes-key: ${AES_KEY:}