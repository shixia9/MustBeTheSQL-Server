version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sql_logic_engine_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sql_logic_engine
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:7.0
    container_name: sql_logic_engine_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mysql_data:
