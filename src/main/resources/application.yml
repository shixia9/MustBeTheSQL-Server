      id-type: auto
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token Configuration
sa-token: 
    # token 名称
    token-name: satoken
    # token 有效期（单位：秒） 默认30天，-1 代表永久有效
    timeout: 2592000
    # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
    active-timeout: -1
    # 是否允许同一账号多地同时登录
    is-concurrent: true
    # 在多人登录同一账号时，是否共用一个 token
    is-share: true
    # token 风格
    token-style: uuid
    # 是否输出操作日志 
    is-log: true

